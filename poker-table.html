<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Table</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; overflow: hidden; }
  body { background: #0a0f1a; font-family: 'JetBrains Mono', monospace; color: #e2e8f0; }
  input, select, button { font-family: 'JetBrains Mono', monospace; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d1321; }
  ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

const SUITS = ["s","h","d","c"];
const RANKS = ["A","K","Q","J","T","9","8","7","6","5","4","3","2"];
const SUIT_SYMBOLS = { s:"\u2660", h:"\u2665", d:"\u2666", c:"\u2663" };

const DEFAULT_PLAYERS = [
  { name:"Hero", stack:35, isHero:true, bounty:2.5 },
  { name:"Villain 2", stack:50, isHero:false, bounty:2.5 },
  { name:"Villain 3", stack:80, isHero:false, bounty:2.5 },
  { name:"Villain 4", stack:100, isHero:false, bounty:2.5 },
  { name:"Villain 5", stack:60, isHero:false, bounty:2.5 },
  { name:"Villain 6", stack:45, isHero:false, bounty:2.5 },
  { name:"Villain 7", stack:30, isHero:false, bounty:2.5 },
  { name:"Villain 8", stack:25, isHero:false, bounty:2.5 },
  { name:"Villain 9", stack:40, isHero:false, bounty:2.5 },
];

function getSeatPositions(count) {
  const positions = [];
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI / 2) + (2 * Math.PI * i) / count;
    const x = 50 + 40 * Math.cos(angle);
    const y = 50 + 32 * Math.sin(angle);
    positions.push({ x, y });
  }
  return positions;
}

function CardDisplay({ card, small }) {
  if (!card) return (
    <div style={{
      width: small?26:34, height: small?36:48,
      background:"linear-gradient(135deg,#1a365d,#2d3748)",
      borderRadius:4, border:"1px solid #4a5568", display:"inline-block",
    }}/>
  );
  const color = card[1]==="h"||card[1]==="d" ? "#ef4444" : "#1e293b";
  return (
    <div style={{
      width: small?26:34, height: small?36:48,
      background:"#f8fafc", borderRadius:4, border:"1px solid #94a3b8",
      display:"inline-flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
      fontWeight:700, fontSize: small?10:13, color, lineHeight:1,
    }}>
      <span>{card[0]}</span>
      <span style={{fontSize: small?9:11}}>{SUIT_SYMBOLS[card[1]]}</span>
    </div>
  );
}

function CardSelector({ label, value, onChange, usedCards }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    function handleClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  const allCards = RANKS.flatMap(r => SUITS.map(s => r + s));

  return (
    <div ref={ref} style={{ position:"relative", display:"inline-block" }}>
      <div style={{fontSize:9, color:"#64748b", marginBottom:2, textAlign:"center"}}>{label}</div>
      <div onClick={() => setOpen(!open)} style={{
        cursor:"pointer", padding:2, borderRadius:4,
        border: open ? "2px solid #22d3ee" : "2px solid transparent",
      }}>
        {value ? <CardDisplay card={value}/> : (
          <div style={{
            width:34, height:48, background:"#1e293b", borderRadius:4,
            border:"2px dashed #4a5568", display:"flex", alignItems:"center",
            justifyContent:"center", color:"#64748b", fontSize:16,
          }}>?</div>
        )}
      </div>
      {open && (
        <div style={{
          position:"absolute", bottom:"100%", left:"50%", transform:"translateX(-50%)",
          marginBottom:4, background:"#1e293b", border:"1px solid #334155",
          borderRadius:8, padding:8, zIndex:100, width:195,
          boxShadow:"0 8px 32px rgba(0,0,0,0.5)",
        }}>
          {value && (
            <button onClick={(e)=>{e.stopPropagation();onChange(null);setOpen(false);}} style={{
              width:"100%", padding:"3px 0", marginBottom:5, background:"#7f1d1d",
              border:"none", borderRadius:4, color:"#fca5a5", cursor:"pointer", fontSize:10, fontWeight:600,
            }}>Clear</button>
          )}
          <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:2}}>
            {allCards.map(c => {
              const disabled = usedCards.includes(c) && c!==value;
              const clr = c[1]==="h"||c[1]==="d" ? "#ef4444" : "#e2e8f0";
              return (
                <button key={c} disabled={disabled}
                  onClick={(e)=>{e.stopPropagation();onChange(c);setOpen(false);}}
                  style={{
                    padding:"3px 1px", background: c===value?"#164e63":"#0f172a",
                    border: c===value?"1px solid #22d3ee":"1px solid #1e293b",
                    borderRadius:3, cursor: disabled?"not-allowed":"pointer",
                    color: disabled?"#334155":clr,
                    fontWeight:700, fontSize:10, opacity: disabled?0.3:1,
                  }}
                >{c[0]}{SUIT_SYMBOLS[c[1]]}</button>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function PokerTable() {
  const [tournamentType, setTournamentType] = useState("bounty");
  const [blindLevel, setBlindLevel] = useState(9);
  const [sb, setSb] = useState(250);
  const [bb, setBb] = useState(500);
  const [ante, setAnte] = useState(60);
  const [bountyBB, setBountyBB] = useState(2.5);
  const [playersLeft, setPlayersLeft] = useState(394);
  const [myRank, setMyRank] = useState(358);
  const [paidPlaces, setPaidPlaces] = useState(71);

  const [playerCount, setPlayerCount] = useState(8);
  const [players, setPlayers] = useState(DEFAULT_PLAYERS);
  const [dealerIndex, setDealerIndex] = useState(null);
  const [heroSeat, setHeroSeat] = useState(0);

  const [handActive, setHandActive] = useState(false);
  const [street, setStreet] = useState("preflop");
  const [pot, setPot] = useState(0);
  const [heroCards, setHeroCards] = useState([null, null]);
  const [boardCards, setBoardCards] = useState([null,null,null,null,null]);
  const [currentAction, setCurrentAction] = useState(null);
  const [playerStates, setPlayerStates] = useState([]);
  const [betAmounts, setBetAmounts] = useState([]);
  const [currentBet, setCurrentBet] = useState(0);
  const [betInput, setBetInput] = useState("");
  const [actionLog, setActionLog] = useState([]);
  const [handHistory, setHandHistory] = useState([]);
  const [showSetup, setShowSetup] = useState(true);
  const [advisorText, setAdvisorText] = useState("");
  const [editingPlayers, setEditingPlayers] = useState(false);

  const seatPositions = getSeatPositions(playerCount);

  const getBBIndex = useCallback(() => {
    if (dealerIndex===null) return null;
    if (playerCount===2) return dealerIndex;
    return (dealerIndex+2) % playerCount;
  }, [dealerIndex, playerCount]);

  const getSBIndex = useCallback(() => {
    if (dealerIndex===null) return null;
    if (playerCount===2) return dealerIndex % playerCount;
    return (dealerIndex+1) % playerCount;
  }, [dealerIndex, playerCount]);

  function getPositionLabel(seatIndex) {
    if (dealerIndex===null) return "";
    const offset = (seatIndex - dealerIndex + playerCount) % playerCount;
    if (playerCount===2) return offset===0 ? "BTN/SB" : "BB";
    if (offset===0) return "BTN";
    if (offset===1) return "SB";
    if (offset===2) return "BB";
    const rem = playerCount - 3;
    const posIdx = offset - 3;
    if (rem<=1) return "UTG";
    if (rem===2) return ["UTG","CO"][posIdx];
    if (rem===3) return ["UTG","MP","CO"][posIdx];
    if (rem===4) return ["UTG","UTG+1","MP","CO"][posIdx];
    if (rem===5) return ["UTG","UTG+1","LJ","HJ","CO"][posIdx];
    if (rem===6) return ["UTG","UTG+1","MP","LJ","HJ","CO"][posIdx];
    return "Seat "+(seatIndex+1);
  }

  function getFirstToAct(st, states) {
    if (st==="preflop") {
      const utg = (dealerIndex+3) % playerCount;
      for (let i=0; i<playerCount; i++) {
        const idx = (utg+i) % playerCount;
        if (states[idx]==="active") return idx;
      }
      return null;
    } else {
      const sbIdx = getSBIndex();
      for (let i=0; i<playerCount; i++) {
        const idx = (sbIdx+i) % playerCount;
        if (states[idx]==="active") return idx;
      }
      return null;
    }
  }

  function saveSnapshot() {
    setHandHistory(prev => [...prev, {
      street, pot, currentAction,
      playerStates:[...playerStates], betAmounts:[...betAmounts],
      currentBet, actionLog:[...actionLog], boardCards:[...boardCards],
    }]);
  }

  function handleUndo() {
    if (handHistory.length===0) return;
    const prev = handHistory[handHistory.length-1];
    setStreet(prev.street); setPot(prev.pot); setCurrentAction(prev.currentAction);
    setPlayerStates(prev.playerStates); setBetAmounts(prev.betAmounts);
    setCurrentBet(prev.currentBet); setActionLog(prev.actionLog);
    setBoardCards(prev.boardCards);
    setHandHistory(h => h.slice(0,-1));
    // Restore advisor text
    if (prev.currentAction === heroSeat) {
      setAdvisorText("YOUR ACTION — undone to your turn");
    } else {
      const name = players[prev.currentAction]?.name || "?";
      setAdvisorText(name + " to act (undone). Pot: "+prev.pot.toFixed(1)+"BB");
    }
  }

  function dealHand() {
    if (dealerIndex===null) { alert("Click a seat to set dealer (BTN) first."); return; }
    if (!heroCards[0]||!heroCards[1]) { alert("Enter your hole cards first."); return; }
    const states = players.slice(0,playerCount).map(()=>"active");
    const bets = players.slice(0,playerCount).map(()=>0);
    const sbIdx = getSBIndex();
    const bbIdx = getBBIndex();
    let initPot = 0;
    const antePerPlayer = ante / bb;
    for (let i=0; i<playerCount; i++) { bets[i]=antePerPlayer; initPot+=antePerPlayer; }
    bets[sbIdx]+=0.5; initPot+=0.5;
    bets[bbIdx]+=1; initPot+=1;

    setPlayerStates(states); setBetAmounts(bets); setCurrentBet(1);
    setPot(initPot); setStreet("preflop"); setHandActive(true);
    setActionLog([]); setHandHistory([]); setBoardCards([null,null,null,null,null]);

    const firstAct = getFirstToAct("preflop", states);
    setCurrentAction(firstAct);

    if (firstAct===heroSeat) {
      genAdvisor(states, bets, "preflop", initPot, 1);
    } else {
      const n = players[firstAct]?.name||"?";
      setAdvisorText("Waiting for "+n+" ("+getPositionLabel(firstAct)+") to act...");
    }
  }

  function genAdvisor(states, bets, st, curPot, cBet) {
    const pos = getPositionLabel(heroSeat);
    const stack = players[heroSeat].stack;
    const active = states.filter(s=>s==="active").length;
    const c1 = heroCards[0] ? heroCards[0][0]+SUIT_SYMBOLS[heroCards[0][1]] : "?";
    const c2 = heroCards[1] ? heroCards[1][0]+SUIT_SYMBOLS[heroCards[1][1]] : "?";
    const toCall = cBet - (bets[heroSeat]||0);
    let t = "YOUR ACTION \u2014 "+pos+" \u2014 "+c1+c2+"\n";
    t += "Stack: "+stack.toFixed(1)+"BB | Pot: "+curPot.toFixed(1)+"BB | "+active+" active\n";
    if (toCall>0) t += "Facing "+toCall.toFixed(1)+"BB to call\n";
    else t += "Checked to you\n";
    const brd = boardCards.filter(c=>c).map(c=>c[0]+SUIT_SYMBOLS[c[1]]).join(" ");
    if (brd) t += "Board: "+brd+"\n";
    t += "\nWhat's your play?";
    setAdvisorText(t);
  }

  function getNextPlayer(fromIdx, states) {
    for (let i=1; i<playerCount; i++) {
      const idx = (fromIdx+i) % playerCount;
      if (states[idx]==="active") return idx;
    }
    return null;
  }

  function handleAction(action, amount) {
    if (currentAction===null||!handActive) return;
    saveSnapshot();
    const newStates = [...playerStates];
    const newBets = [...betAmounts];
    let newPot = pot;
    let newCBet = currentBet;
    const name = players[currentAction]?.name||"?";
    const pos = getPositionLabel(currentAction);
    const newLog = [...actionLog];

    switch(action) {
      case "fold":
        newStates[currentAction]="folded";
        newLog.push(name+" ("+pos+") folds");
        break;
      case "check":
        newLog.push(name+" ("+pos+") checks");
        break;
      case "call": {
        const callAmt = currentBet - newBets[currentAction];
        newBets[currentAction] = currentBet;
        newPot += callAmt;
        newLog.push(name+" ("+pos+") calls "+callAmt.toFixed(1)+"BB");
        break;
      }
      case "bet": case "raise": {
        const raiseAmt = parseFloat(amount)||(currentBet>0?currentBet*2:2);
        const add = raiseAmt - newBets[currentAction];
        newBets[currentAction] = raiseAmt;
        newPot += add; newCBet = raiseAmt;
        newLog.push(name+" ("+pos+") "+action+"s to "+raiseAmt.toFixed(1)+"BB");
        break;
      }
      case "allin": {
        const st = players[currentAction].stack;
        const add = st - newBets[currentAction];
        newBets[currentAction]=st; newPot+=add;
        if (st>newCBet) newCBet=st;
        newStates[currentAction]="allin";
        newLog.push(name+" ("+pos+") all-in "+st.toFixed(1)+"BB");
        break;
      }
    }

    setPlayerStates(newStates); setBetAmounts(newBets);
    setPot(newPot); setCurrentBet(newCBet); setActionLog(newLog);

    const alive = newStates.filter(s=>s==="active"||s==="allin").length;
    if (alive<=1) {
      setCurrentAction(null); setHandActive(false);
      setAdvisorText("Hand over. Pot: "+newPot.toFixed(1)+"BB");
      return;
    }

    const next = getNextPlayer(currentAction, newStates);
    setCurrentAction(next);
    if (next===heroSeat) {
      genAdvisor(newStates, newBets, street, newPot, newCBet);
    } else {
      const nn = players[next]?.name||"?";
      setAdvisorText(nn+" ("+getPositionLabel(next)+") to act. Pot: "+newPot.toFixed(1)+"BB");
    }
  }

  function advanceStreet() {
    if (!handActive) return;
    saveSnapshot();
    const order = ["preflop","flop","turn","river","showdown"];
    const idx = order.indexOf(street);
    if (idx>=order.length-1) { setHandActive(false); setAdvisorText("Showdown. Pot: "+pot.toFixed(1)+"BB"); return; }
    const next = order[idx+1];
    setStreet(next);
    const newBets = betAmounts.map(()=>0);
    setBetAmounts(newBets); setCurrentBet(0);
    if (next==="showdown") { setCurrentAction(null); setAdvisorText("Showdown. Pot: "+pot.toFixed(1)+"BB"); return; }
    const firstAct = getFirstToAct(next, playerStates);
    setCurrentAction(firstAct);
    if (firstAct===heroSeat) {
      genAdvisor(playerStates, newBets, next, pot, 0);
    } else {
      const n = players[firstAct]?.name||"?";
      setAdvisorText(next.charAt(0).toUpperCase()+next.slice(1)+" \u2014 "+n+" ("+getPositionLabel(firstAct)+") to act. Pot: "+pot.toFixed(1)+"BB");
    }
  }

  function endHand() { setHandActive(false); setCurrentAction(null); setAdvisorText(""); }

  function updatePlayer(idx, field, value) {
    setPlayers(prev => { const np=[...prev]; np[idx]={...np[idx],[field]:value}; return np; });
  }

  const usedCards = [...heroCards, ...boardCards].filter(c=>c);
  const activeSeatPositions = seatPositions.slice(0, playerCount);

  const inp = { background:"#111827", border:"1px solid #334155", borderRadius:4, padding:"4px 8px", color:"#e2e8f0", fontSize:11, outline:"none" };
  const abtn = (bg,c,bd) => ({ background:bg, color:c, border:"1px solid "+bd, borderRadius:6, padding:"7px 16px", fontWeight:700, cursor:"pointer", fontSize:11 });

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden" }}>
      {/* Top Bar */}
      <div style={{ background:"#0d1321", borderBottom:"1px solid #1e293b", padding:"7px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:6 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          <span style={{ color:"#22d3ee", fontWeight:800, fontSize:14, letterSpacing:2 }}>POKER TABLE</span>
          <button onClick={dealHand} disabled={handActive} style={{
            ...abtn(handActive?"#374151":"#059669", handActive?"#6b7280":"#fff", handActive?"#374151":"#059669"),
            cursor: handActive?"default":"pointer",
          }}>Deal Hand</button>
          {handActive && <>
            <button onClick={advanceStreet} style={abtn("#1e40af","#93c5fd","#1e40af")}>Next Street \u2192</button>
            <button onClick={endHand} style={abtn("#7f1d1d","#fca5a5","#7f1d1d")}>End Hand</button>
          </>}
          <button onClick={handleUndo} disabled={handHistory.length===0} style={{
            ...abtn(handHistory.length>0?"#44403c":"#1e293b", handHistory.length>0?"#fbbf24":"#475569", "#44403c"),
            opacity: handHistory.length>0?1:0.5, cursor: handHistory.length>0?"pointer":"default",
          }}>{"\u21A9"} Undo</button>
        </div>
        <div style={{ display:"flex", gap:6 }}>
          <button onClick={()=>setShowSetup(!showSetup)} style={{ background:"#1e293b", color:"#94a3b8", border:"1px solid #334155", borderRadius:5, padding:"5px 10px", cursor:"pointer", fontSize:10 }}>
            {showSetup?"Hide":"Show"} Setup
          </button>
          <button onClick={()=>setEditingPlayers(!editingPlayers)} style={{ background:"#1e293b", color:"#94a3b8", border:"1px solid #334155", borderRadius:5, padding:"5px 10px", cursor:"pointer", fontSize:10 }}>
            Players
          </button>
        </div>
      </div>

      {/* Setup Panel */}
      {showSetup && (
        <div style={{ background:"#0d1321", borderBottom:"1px solid #1e293b", padding:"8px 14px", display:"flex", flexWrap:"wrap", gap:12, alignItems:"flex-end" }}>
          {[
            ["Type", <select value={tournamentType} onChange={e=>setTournamentType(e.target.value)} style={{...inp,width:75}}><option value="bounty">Bounty</option><option value="normal">Normal</option></select>],
            ["Level", <input type="number" value={blindLevel} onChange={e=>setBlindLevel(parseInt(e.target.value)||1)} style={{...inp,width:48}}/>],
            ["SB", <input type="number" value={sb} onChange={e=>setSb(parseInt(e.target.value)||0)} style={{...inp,width:60}}/>],
            ["BB", <input type="number" value={bb} onChange={e=>setBb(parseInt(e.target.value)||0)} style={{...inp,width:60}}/>],
            ["Ante", <input type="number" value={ante} onChange={e=>setAnte(parseInt(e.target.value)||0)} style={{...inp,width:55}}/>],
            ["Seats", <select value={playerCount} onChange={e=>setPlayerCount(parseInt(e.target.value))} style={{...inp,width:48}}>{[2,3,4,5,6,7,8,9].map(n=><option key={n} value={n}>{n}</option>)}</select>],
            ...(tournamentType==="bounty" ? [["Bounty", <input type="number" value={bountyBB} step="0.5" onChange={e=>setBountyBB(parseFloat(e.target.value)||0)} style={{...inp,width:50}}/>]] : []),
            ["Left", <input type="number" value={playersLeft} onChange={e=>setPlayersLeft(parseInt(e.target.value)||0)} style={{...inp,width:55}}/>],
            ["Rank", <input type="number" value={myRank} onChange={e=>setMyRank(parseInt(e.target.value)||0)} style={{...inp,width:55}}/>],
            ["ITM", <input type="number" value={paidPlaces} onChange={e=>setPaidPlaces(parseInt(e.target.value)||0)} style={{...inp,width:50}}/>],
          ].map(([label, el], i) => (
            <label key={i} style={{display:"flex",flexDirection:"column",gap:2}}>
              <span style={{fontSize:8,color:"#64748b",textTransform:"uppercase",letterSpacing:1,fontWeight:700}}>{label}</span>
              {el}
            </label>
          ))}
        </div>
      )}

      {/* Player Editor */}
      {editingPlayers && (
        <div style={{ background:"#0d1321", borderBottom:"1px solid #1e293b", padding:"8px 14px", maxHeight:180, overflowY:"auto" }}>
          <div style={{fontSize:10,color:"#64748b",marginBottom:5}}>Click a seat on the table to set dealer (BTN). Hero = {"\u2605"}</div>
          {players.slice(0,playerCount).map((p,i) => (
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
              <span style={{width:18,fontSize:10,color:"#64748b"}}>{i+1}</span>
              <input value={p.name} onChange={e=>updatePlayer(i,"name",e.target.value)} style={{...inp,width:90}} placeholder="Name"/>
              <input type="number" value={p.stack} step="0.1" onChange={e=>updatePlayer(i,"stack",parseFloat(e.target.value)||0)} style={{...inp,width:60}} placeholder="BB"/>
              <button onClick={()=>setHeroSeat(i)} style={{
                background: heroSeat===i?"#059669":"#1e293b", color: heroSeat===i?"#fff":"#64748b",
                border:"1px solid #334155", borderRadius:4, padding:"2px 7px", cursor:"pointer", fontSize:10,
              }}>{heroSeat===i?"\u2605 Hero":"Set Hero"}</button>
              <span style={{fontSize:10,color:"#94a3b8",minWidth:35}}>{getPositionLabel(i)}</span>
            </div>
          ))}
        </div>
      )}

      {/* Main: Table + Sidebar */}
      <div style={{ display:"flex", flex:1, minHeight:0, overflow:"hidden" }}>
        {/* Table */}
        <div style={{ flex:1, position:"relative", minHeight:350, padding:12 }}>
          <div style={{ position:"relative", width:"100%", height:"100%", minHeight:320 }}>
            {/* Felt */}
            <div style={{
              position:"absolute", left:"5%", right:"5%", top:"6%", bottom:"6%",
              background:"radial-gradient(ellipse at center,#1a4a2e 0%,#0f3320 60%,#0a2618 100%)",
              borderRadius:"50%", border:"3px solid #2d5a3d",
              boxShadow:"0 0 60px rgba(0,0,0,0.6),inset 0 0 40px rgba(0,0,0,0.3)",
            }}>
              {/* Pot */}
              <div style={{
                position:"absolute", top:"35%", left:"50%", transform:"translateX(-50%)",
                background:"rgba(0,0,0,0.5)", borderRadius:8, padding:"5px 12px", textAlign:"center",
              }}>
                <div style={{fontSize:9,color:"#94a3b8"}}>POT</div>
                <div style={{fontSize:16,fontWeight:800,color:"#fbbf24"}}>{pot.toFixed(1)} BB</div>
                {handActive && <div style={{fontSize:9,color:"#22d3ee",marginTop:1,textTransform:"uppercase",fontWeight:700}}>{street}</div>}
              </div>
              {/* Board */}
              <div style={{ position:"absolute", top:"55%", left:"50%", transform:"translateX(-50%)", display:"flex", gap:3 }}>
                {[0,1,2,3,4].map(i => {
                  const show = (street==="flop"&&i<3)||(street==="turn"&&i<4)||(street==="river"&&i<5)||(street==="showdown"&&i<5);
                  if (!handActive && !boardCards[i]) return <div key={i} style={{width:36,height:50,background:"rgba(0,0,0,0.2)",borderRadius:4,border:"1px dashed rgba(255,255,255,0.1)"}}/>;
                  return <div key={i}>{show||boardCards[i] ? <CardDisplay card={boardCards[i]}/> : <div style={{width:34,height:48,background:"rgba(0,0,0,0.2)",borderRadius:4,border:"1px dashed rgba(255,255,255,0.1)"}}/>}</div>;
                })}
              </div>
            </div>

            {/* Seats */}
            {activeSeatPositions.map((pos,i) => {
              const p = players[i]; if (!p) return null;
              const isD = i===dealerIndex, isH = i===heroSeat, isAct = handActive&&currentAction===i;
              const folded = playerStates[i]==="folded", allIn = playerStates[i]==="allin";
              return (
                <div key={i} onClick={()=>{if(!handActive) setDealerIndex(i);}}
                  style={{
                    position:"absolute", left:pos.x+"%", top:pos.y+"%", transform:"translate(-50%,-50%)",
                    textAlign:"center", cursor: handActive?"default":"pointer",
                    opacity: folded?0.3:1, transition:"opacity 0.2s",
                  }}>
                  <div style={{
                    width:52, height:52, borderRadius:"50%", margin:"0 auto", position:"relative",
                    background: isAct?"linear-gradient(135deg,#059669,#047857)":isH?"linear-gradient(135deg,#1e40af,#1e3a8a)":"#1e293b",
                    border: isAct?"3px solid #34d399":isD?"3px solid #fbbf24":isH?"2px solid #3b82f6":"2px solid #334155",
                    display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
                    boxShadow: isAct?"0 0 14px rgba(52,211,153,0.4)":"none",
                  }}>
                    <div style={{fontSize:9,fontWeight:700,color:"#e2e8f0",maxWidth:44,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                    {isD && <div style={{position:"absolute",top:-5,right:-5,background:"#fbbf24",color:"#000",fontSize:8,fontWeight:900,width:16,height:16,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>D</div>}
                    {isH && <div style={{position:"absolute",top:-5,left:-5,background:"#3b82f6",color:"#fff",fontSize:8,fontWeight:900,width:16,height:16,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{"\u2605"}</div>}
                  </div>
                  <div style={{fontSize:10,color:"#fbbf24",fontWeight:700,marginTop:2}}>{p.stack.toFixed(1)}BB</div>
                  <div style={{fontSize:8,color:"#94a3b8"}}>
                    {getPositionLabel(i)}
                    {allIn && <span style={{color:"#ef4444",marginLeft:3}}>ALL-IN</span>}
                  </div>
                  {handActive && betAmounts[i]>0 && <div style={{fontSize:9,color:"#fb923c",marginTop:1}}>{betAmounts[i].toFixed(1)}BB</div>}
                  {isH && heroCards[0] && (
                    <div style={{display:"flex",gap:2,marginTop:2,justifyContent:"center"}}>
                      <CardDisplay card={heroCards[0]} small/>
                      <CardDisplay card={heroCards[1]} small/>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Sidebar */}
        <div style={{ width:260, background:"#0d1321", borderLeft:"1px solid #1e293b", display:"flex", flexDirection:"column", padding:10, gap:10, overflowY:"auto" }}>
          {/* Hero Cards */}
          <div style={{ background:"#111827", borderRadius:8, padding:10, border:"1px solid #1e293b" }}>
            <div style={{fontSize:10,fontWeight:700,color:"#22d3ee",marginBottom:6,letterSpacing:1}}>YOUR CARDS</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <CardSelector label="CARD 1" value={heroCards[0]} onChange={c=>setHeroCards([c,heroCards[1]])} usedCards={usedCards}/>
              <CardSelector label="CARD 2" value={heroCards[1]} onChange={c=>setHeroCards([heroCards[0],c])} usedCards={usedCards}/>
            </div>
          </div>

          {/* Board Cards */}
          {handActive && street!=="preflop" && (
            <div style={{ background:"#111827", borderRadius:8, padding:10, border:"1px solid #1e293b" }}>
              <div style={{fontSize:10,fontWeight:700,color:"#22d3ee",marginBottom:6,letterSpacing:1}}>BOARD</div>
              <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
                {[0,1,2,3,4].map(i => {
                  const needed = street==="flop"?3:street==="turn"?4:5;
                  if (i>=needed) return null;
                  return <CardSelector key={i} label={i<3?"F"+(i+1):i===3?"T":"R"} value={boardCards[i]}
                    onChange={c=>{const nb=[...boardCards];nb[i]=c;setBoardCards(nb);}} usedCards={usedCards}/>;
                })}
              </div>
            </div>
          )}

          {/* Advisor */}
          {advisorText && (
            <div style={{ background:"#111827", borderRadius:8, padding:10, border:"1px solid #1e293b" }}>
              <div style={{fontSize:10,fontWeight:700,color:"#fbbf24",marginBottom:5,letterSpacing:1}}>ADVISOR</div>
              <pre style={{fontSize:10,color:"#e2e8f0",whiteSpace:"pre-wrap",margin:0,lineHeight:1.5}}>{advisorText}</pre>
            </div>
          )}

          {/* Log */}
          {actionLog.length>0 && (
            <div style={{ background:"#111827", borderRadius:8, padding:10, border:"1px solid #1e293b", flex:1, overflow:"auto" }}>
              <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",marginBottom:5,letterSpacing:1}}>ACTION LOG</div>
              <div style={{fontSize:9,color:"#64748b",lineHeight:1.6}}>
                {actionLog.map((l,i)=><div key={i}>{l}</div>)}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* Action Bar */}
      {handActive && currentAction!==null && (
        <div style={{ background:"#0d1321", borderTop:"1px solid #1e293b", padding:"8px 14px" }}>
          <div style={{fontSize:10,color:"#94a3b8",marginBottom:5}}>
            <strong style={{color: currentAction===heroSeat?"#22d3ee":"#e2e8f0"}}>{players[currentAction]?.name||"?"}</strong>
            {" ("+getPositionLabel(currentAction)+") \u2014 "+(currentAction===heroSeat?"YOUR ACTION":"to act")}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            {betAmounts[currentAction]>=currentBet ? (
              <button onClick={()=>handleAction("check")} style={abtn("#1e293b","#e2e8f0","#334155")}>Check</button>
            ) : (
              <button onClick={()=>handleAction("call")} style={abtn("#1e40af","#93c5fd","#1e40af")}>
                Call {(currentBet-(betAmounts[currentAction]||0)).toFixed(1)}BB
              </button>
            )}
            <button onClick={()=>{
              const amt=parseFloat(betInput);
              if(!amt||amt<=currentBet) handleAction("bet",currentBet>0?currentBet*2.2:2.2);
              else handleAction(currentBet>0?"raise":"bet",amt);
              setBetInput("");
            }} style={abtn("#065f46","#34d399","#065f46")}>{currentBet>0?"Raise":"Bet"}</button>
            <input type="number" value={betInput} onChange={e=>setBetInput(e.target.value)} placeholder="BB amt" style={{...inp,width:70,height:30}}/>
            <button onClick={()=>handleAction("allin")} style={abtn("#7c2d12","#fb923c","#7c2d12")}>All-In</button>
            <button onClick={()=>handleAction("fold")} style={abtn("#7f1d1d","#f87171","#7f1d1d")}>Fold</button>
            <div style={{flex:1}}/>
            <button onClick={handleUndo} disabled={handHistory.length===0} style={{
              ...abtn(handHistory.length>0?"#44403c":"#1e293b",handHistory.length>0?"#fbbf24":"#475569","#44403c"),
              opacity:handHistory.length>0?1:0.5, cursor:handHistory.length>0?"pointer":"default",
            }}>{"\u21A9"} Undo</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<PokerTable/>, document.getElementById("root"));
</script>
</body>
</html>
